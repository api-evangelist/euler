    url: https://euler.finance
- name: Euler V2 TypeScript SDK
  description: The recommended TypeScript entry point for applications, bots, scripts,
    and operational tooling built on Euler V2. Provides protocol data fetching, EVC
    batch composition, transaction simulation, approval resolution via standard approve
    and Permit2, swap operations, pricing, rewards, oracle adapter metadata, and FeeFlow
    management.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.euler.finance/developers/sdk
  baseURL: https://docs.euler.finance
