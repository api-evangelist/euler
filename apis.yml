apis:
- name: Euler V3 Data API
  description: The primary REST API for querying indexed Euler protocol data including
    vaults, account positions, token prices, APYs, reward campaigns, liquidation events,
    oracle routing, and chain-level analytics. Supports unauthenticated and API-key-authenticated
    access with higher rate limits.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.euler.finance/developers/data-querying/euler-v3-api
  baseURL: https://v3.euler.finance/v3
  tags:
  - Vaults
  - Lending
  - Positions
  - Liquidation
  - Interest Rates
  - Analytics
  - DeFi
  properties:
  - type: Documentation
    url: https://docs.euler.finance/developers/data-querying/euler-v3-api
