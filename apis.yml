  - url: graphql/euler-graphql.md
    type: GraphQL
  contact:
  - FN: Euler Finance Developer Support
    email: leonard@euler.xyz
- name: Euler Off-Chain Prices API
  description: An unofficial REST endpoint for fetching USD-denominated asset prices
    for ERC-20 tokens across supported networks. Accepts chainId and comma-separated
    asset addresses. Returns prices with 18-decimal precision. Users should validate
    returned prices and maintain fallback sources.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.euler.finance/developers/data-querying/off-chain-prices
  baseURL: https://app.euler.finance/api/v1
  tags:
  - Prices
  - Tokens
  - DeFi
  - Analytics
  properties:
  - type: Documentation
    url: https://docs.euler.finance/developers/data-querying/off-chain-prices
  contact:
  - FN: Euler Finance
    url: https://euler.finance
- name: Euler Subgraphs (GraphQL)
  description: GraphQL-based subgraph endpoints hosted on Goldsky for querying indexed
    Euler V2 protocol data including vault states, account positions, borrow/supply
    history, interest rates, collateral relationships, EulerEarn strategies, and swap
    pools across Mainnet, Base, Arbitrum, Optimism, Berachain, Avalanche, BSC, Sonic,
    and additional networks.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.euler.finance/developers/data-querying/subgraphs
  baseURL: https://api.goldsky.com/api/public/project_cm4iagnemt1wp01xn4gh1agft/subgraphs
  tags:
  - GraphQL
  - Subgraph
  - Vaults
  - Positions
  - History
  - Analytics
  - DeFi
  properties:
  - type: Documentation
    url: https://docs.euler.finance/developers/data-querying/subgraphs
  - type: GitHubRepository
    url: https://github.com/euler-xyz/euler-subgraph
  - url: graphql/euler-schema.graphql
    type: GraphQLSchema
  contact:
