name: Euler Finance
description: Euler is a permissionless modular lending protocol that enables users
  to lend, borrow, and build custom lending markets without limits. The platform provides
  REST APIs for querying vaults, account positions, interest rates, liquidation thresholds,
  token prices, APYs, reward campaigns, and lending market analytics across multiple
  EVM-compatible networks.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/euler/refs/heads/main/apis.yml
created: '2026-06-14'
modified: '2026-06-14'
specificationVersion: '0.19'
tags:
