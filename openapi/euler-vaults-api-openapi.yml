          type: boolean
        refreshTriggered:
          type: boolean
        refreshCompleted:
          type: boolean
        timedOut:
          type: boolean
        rateLimited:
          type: boolean
        fallbackReason:
          type: string
          nullable: true
        waitedMs:
          type: integer
        latestSnapshotTimestamp:
          type: string
          format: date-time
        ageSeconds:
          type: integer
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          - requestId
          properties:
            code:
              type: string
              description: 'Domain error code. Examples:

                - INVALID_ADDRESS

                - CHAIN_NOT_SUPPORTED

                - VAULT_NOT_FOUND

                - TOKEN_NOT_FOUND

                - ACCOUNT_NOT_FOUND

                - VALIDATION_ERROR

                - RATE_LIMIT_EXCEEDED

                - UNSUPPORTED_MEDIA_TYPE

                - UNAUTHORIZED

                - FORBIDDEN

                - INTERNAL_ERROR

                '
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
              additionalProperties: true
    OracleInfo:
      type: object
      properties:
        oracle:
          type: string
        name:
          type: string
        detailedInfo:
          $ref: '#/components/schemas/OracleDetailedInfo'
        adapters:
          type: array
          items:
            $ref: '#/components/schemas/OracleAdapterEntry'
        resolvedVaults:
          type: array
          items:
            $ref: '#/components/schemas/OracleResolvedVault'
    VaultPosition:
      type: object
      properties:
