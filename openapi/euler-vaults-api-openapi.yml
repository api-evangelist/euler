          type: string
        shares:
          type: string
          description: Raw vault share amount as a bigint string.
        assets:
          type: string
          description: Raw underlying asset amount as a bigint string.
        assetsUsd:
          type: number
          nullable: true
          description: Market USD number computed from `assets` and the token price endpoint.
        lastUpdatedBlock:
          type: string
    VaultDetailResponseWithIncludes:
      allOf:
      - $ref: '#/components/schemas/VaultDetailResponse'
      - type: object
        properties:
          collaterals:
            type: array
            items:
              $ref: '#/components/schemas/VaultCollateralDetail'
            nullable: true
          apy:
            allOf:
            - $ref: '#/components/schemas/VaultApy'
            nullable: true
          totals:
            allOf:
            - $ref: '#/components/schemas/VaultTotals'
            nullable: true
          prices:
            allOf:
            - $ref: '#/components/schemas/VaultIncludePrices'
            nullable: true
    VaultTotalsMeta:
      allOf:
      - $ref: '#/components/schemas/VaultApyMeta'
      - type: object
        properties:
          note:
            type: string
    VaultLiquidation:
      type: object
      properties:
        maxLiquidationDiscount:
          type: number
        liquidationCoolOffTime:
          type: integer
        socializeDebt:
          type: boolean
    VaultTotals:
      type: object
      properties:
        current:
          $ref: '#/components/schemas/VaultTotalsPoint'
        history:
          type: array
          items:
            $ref: '#/components/schemas/VaultTotalsPoint'
    OracleResolvedVault:
      type: object
      properties:
        vault:
          type: string
        quote:
          type: string
        asset:
          type: string
        resolvedAssets:
          type: array
          items:
            type: string
    Vault:
      type: object
      properties:
        chainId:
          type: integer
        address:
          type: string
        vaultType:
          type: string
          enum:
          - evk
          description: Vault family for the `/v3/evk/vaults` EVK surface.
        name:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        shares:
          $ref: '#/components/schemas/AssetRef'
        asset:
          $ref: '#/components/schemas/AssetRef'
        totalAssets:
          type: string
          description: Raw underlying asset amount as a bigint string.
        totalBorrows:
          type: string
          description: Raw borrowed asset amount as a bigint string.
        totalSupplyUsd:
          type: number
          description: Market USD number for total supplied assets.
        totalBorrowsUsd:
          type: number
          description: Market USD number for total borrowed assets.
        utilization:
          type: number
          description: Utilization ratio number, computed from market-normalized totals.
        supplyApy:
          type: number
          description: Public supply APY as a percent number.
        borrowApy:
          type: number
          description: Public borrow APY as a percent number.
        createdAt:
          type: string
          format: date-time
    OracleAdapterPythDetail:
      type: object
      properties:
        pyth:
          type: string
        base:
          type: string
        quote:
          type: string
        feedId:
          type: string
        maxStaleness:
          type: string
        maxConfWidth:
          type: string
    VaultResolveEntry:
      type: object
      properties:
        chainId:
          type: integer
        address:
          type: string
        found:
          type: boolean
        vaultType:
          oneOf:
          - type: string
            enum:
            - evk
            - earn
            - securitize
          - type: 'null'
        factory:
          type:
          - string
          - 'null'
        resource:
          type:
          - string
          - 'null'
        snapshotTimestamp:
          type: string
          format: date-time
    VaultDetailsWithIncludes:
      allOf:
      - $ref: '#/components/schemas/VaultDetails'
      - type: object
        properties:
          collaterals:
            type: array
            items:
              $ref: '#/components/schemas/VaultCollateralDetail'
            nullable: true
          apy:
            allOf:
            - $ref: '#/components/schemas/VaultApy'
            nullable: true
          totals:
            allOf:
            - $ref: '#/components/schemas/VaultTotals'
            nullable: true
          prices:
            allOf:
            - $ref: '#/components/schemas/VaultIncludePrices'
            nullable: true
    VaultInterestRates:
      type: object
      description: Contract interest-rate values formatted as decimal strings in fraction units, not public percent APY numbers.
      properties:
        borrowSPY:
          type: string
          description: Borrow rate per second as an exact decimal string.
        borrowAPY:
          type: string
          description: Borrow APY as an exact decimal fraction string; `1` means 100%.
        supplyAPY:
          type: string
          description: Supply APY as an exact decimal fraction string; `1` means 100%.
    OracleAdapterChainlinkDetail:
      type: object
      properties:
        oracle:
          type: string
    Price:
      type: object
      properties:
        chainId:
          type: integer
        address:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        priceUsd:
          type: number
          description: Market-normalized USD price number. If `source` is `oracle`, this endpoint still exposes the v3 market-price number; use `/v3/oracles/prices` for exact contract-derived oracle values.
        source:
          type: string
        confidence:
          type: number
          nullable: true
        blockNumber:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
    VaultCollateralDetail:
      allOf:
      - $ref: '#/components/schemas/CollateralConfig'
      - type: object
        properties:
          oraclePriceRaw:
            allOf:
            - $ref: '#/components/schemas/OraclePriceRaw'
            nullable: true
    AssetRef:
      type: object
      properties:
        address:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        name:
          type: string
          nullable: true
    VaultCaps:
      type: object
      properties:
        supplyCap:
          type: string
          description: Resolved supply cap as a bigint string in underlying asset units.
        borrowCap:
          type: string
          description: Resolved borrow cap as a bigint string in underlying asset units.
    OraclePriceRaw:
      type: object
      description: Exact oracle quote values returned by contracts, represented as raw integer strings in the oracle unit-of-account scale.
      properties:
        queryFailure:
          type: boolean
        queryFailureReason:
          type: string
        amountIn:
          type: string
          description: Raw input amount passed to the oracle.
        amountOutMid:
          type: string
          description: Raw midpoint oracle output amount.
        amountOutBid:
          type: string
          description: Raw bid-side oracle output amount.
        amountOutAsk:
          type: string
          description: Raw ask-side oracle output amount.
        timestamp:
          type: string
          format: date-time
    VaultInterestRateModel:
      type: object
      properties:
        address:
          type: string
        type:
          type: string
          enum:
          - unknown
          - kink
          - adaptive_curve
          - kinky
          - fixed_cyclical_binary
          - fixed_cyclical_binary_monthly
        data:
          type: object
          nullable: true
          additionalProperties:
            type: string
    VaultHookedOperations:
      type: object
      properties:
        deposit:
          type: boolean
        mint:
          type: boolean
        withdraw:
          type: boolean
        redeem:
          type: boolean
        transfer:
          type: boolean
        skim:
          type: boolean
        borrow:
          type: boolean
        repay:
          type: boolean
        repayWithShares:
          type: boolean
        pullDebt:
          type: boolean
        convertFees:
          type: boolean
        liquidate:
          type: boolean
        flashloan:
          type: boolean
        touch:
          type: boolean
        vaultStatusCheck:
          type: boolean
    VaultDetails:
      allOf:
      - $ref: '#/components/schemas/Vault'
      - type: object
        properties:
          dToken:
            type: string
          oracle:
            $ref: '#/components/schemas/OracleInfo'
          unitOfAccount:
            $ref: '#/components/schemas/AssetRef'
          creator:
            type: string
          governor:
            type: string
            description: Latest governor admin if available; falls back to creator.
          governorAdmin:
            type: string
            description: Latest governor admin if available; falls back to creator.
          supplyCap:
            type: string
            description: Resolved supply cap as a bigint string in underlying asset units.
          borrowCap:
            type: string
            description: Resolved borrow cap as a bigint string in underlying asset units.
          totalShares:
            type: string
            description: Raw vault share supply as a bigint string.
          totalBorrowed:
            type: string
            description: Raw borrowed asset amount as a bigint string.
          totalCash:
            type: string
            description: Raw cash amount as a bigint string.
          cash:
            type: string
            description: Raw cash amount as a bigint string.
          interestRate:
            type: string
            description: Raw contract interest-rate value as a bigint string.
          interestAccumulator:
            type: string
            description: Raw contract interest accumulator as a bigint string.
          accumulatedFees:
            type: string
            description: Raw accumulated fee amount as a bigint string.
          balanceTracker:
            type: string
          fees:
            $ref: '#/components/schemas/VaultFees'
          hooks:
            $ref: '#/components/schemas/VaultHooks'
          caps:
            $ref: '#/components/schemas/VaultCaps'
          liquidation:
            $ref: '#/components/schemas/VaultLiquidation'
          interestRates:
            $ref: '#/components/schemas/VaultInterestRates'
          interestRateModel:
            $ref: '#/components/schemas/VaultInterestRateModel'
          evcCompatibleAsset:
            type: boolean
          oraclePriceRaw:
            $ref: '#/components/schemas/OraclePriceRaw'
          timestamp:
            type: string
            format: date-time
          exchangeRate:
            type: string
            nullable: true
            description: Raw exchange rate as a bigint string.
          createdAtBlock:
            type: string
            description: Block number as a bigint string.
    ConfigHistoryItem:
      type: object
      description: Generic configuration change event
      properties:
        type:
          type: string
          enum:
          - caps
          - ltv
          - irm
          - governor
          - feeReceiver
          - hookConfig
          - interestFee
          - configFlags
          description: Type of configuration change
        data:
          type: object
          additionalProperties: true
          description: The configuration values that changed (varies by type). For `ltv` events, canonical basis-point string fields such as `borrowLTV` may be accompanied by legacy decimal aliases.
        blockNumber:
          type: string
          description: Block number of the change
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the change
        txHash:
          type: string
          description: Transaction hash
        logIndex:
          type: integer
          description: Log index within the transaction receipt.
    CapHistoryItem:
      type: object
      description: Historical cap configuration change
      properties:
        supplyCap:
          type: string
          description: Resolved supply cap as a bigint string in underlying asset units.
        borrowCap:
          type: string
          description: Resolved borrow cap as a bigint string in underlying asset units.
        blockNumber:
          type: string
          description: Block number of the change
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the change
        txHash:
          type: string
          description: Transaction hash
        logIndex:
          type: integer
          description: Log index within the transaction receipt.
    IrmHistoryItem:
      type: object
      description: Historical interest rate model change
      properties:
        interestRateModel:
          type: string
          description: Interest rate model contract address
        blockNumber:
          type: string
          description: Block number of the change
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the change
        txHash:
          type: string
          description: Transaction hash
        logIndex:
          type: integer
          description: Log index within the transaction receipt.
    PaginationMeta:
      type: object
      required:
      - timestamp
      properties:
        total:
          type: integer
          description: Exact total count when the endpoint provides one.
        hasMore:
          type: boolean
          description: Indicates whether another page exists beyond the current page.
        offset:
          type: integer
        limit:
          type: integer
          description: Echoed page size after endpoint-side clamping.
        timestamp:
          type: string
          format: date-time
        chainId:
          type: string
          description: Comma-separated chain IDs for multi-chain responses.
    EvkVaultBatchResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/VaultDetailsWithIncludes'
        meta:
          $ref: '#/components/schemas/EvkVaultBatchMeta'
    PublicVaultLabel:
      type: object
      required:
      - chainId
      - vaultAddress
      - displayName
      - updatedAt
      properties:
        chainId:
          type: integer
        vaultAddress:
          type: string
        displayName:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^[^\u0000-\u001F\u007F-\u009F<>]+$
          description: Plain text only; clients must render as text, not HTML or Markdown.
        description:
          type: string
          nullable: true
          maxLength: 1024
          pattern: ^[^\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F-\u009F<>]*$
          description: Plain text only; clients must render as text, not HTML or Markdown. Tabs and line breaks are allowed.
        productCategory:
          type: string
          nullable: true
          maxLength: 120
          pattern: ^[^\u0000-\u001F\u007F-\u009F<>]*$
          description: Plain text only; clients must render as text, not HTML or Markdown.
        riskTier:
          type: string
          nullable: true
          maxLength: 64
          pattern: ^[^\u0000-\u001F\u007F-\u009F<>]*$
          description: Plain text only; clients must render as text, not HTML or Markdown.
        strategyDescription:
          type: string
          nullable: true
          maxLength: 2048
          pattern: ^[^\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F-\u009F<>]*$
          description: Plain text only; clients must render as text, not HTML or Markdown. Tabs and line breaks are allowed.
        updatedAt:
          type: string
          format: date-time
    OracleAdapterEntry:
      type: object
      properties:
        oracle:
          type: string
        name:
          type: string
        base:
          type: string
        quote:
          type: string
        pythDetail:
          allOf:
          - $ref: '#/components/schemas/OracleAdapterPythDetail'
          nullable: true
        chainlinkDetail:
          allOf:
          - $ref: '#/components/schemas/OracleAdapterChainlinkDetail'
          nullable: true
    VaultApyMeta:
      type: object
      properties:
        chainId:
          type: string
        vault:
          type: string
        resolution:
          type: string
          enum:
          - 1h
          - 1d
        startTimestamp:
          type: string
          format: date-time
        endTimestamp:
          type: string
          format: date-time
        timestamp:
          type: string
          format: date-time
    VaultTotalsPoint:
      type: object
      properties:
        totalAssets:
          type: string
          description: Raw underlying asset amount as a bigint string.
        totalBorrows:
          type: string
          description: Raw borrowed asset amount as a bigint string.
        cash:
          type: string
          nullable: true
          description: Raw cash amount as a bigint string.
        utilization:
          type: number
          nullable: true
          description: Utilization ratio number.
        supplyApy:
          type: number
          nullable: true
          description: Public supply APY as a percent number.
        borrowApy:
          type: number
          nullable: true
          description: Public borrow APY as a percent number.
        timestamp:
          type: string
          format: date-time
    EvkVaultBatchMeta:
      type: object
      properties:
        count:
          type: integer
        requested:
          type: integer
        notFound:
          type: array
          items:
            type: string
        timestamp:
          type: string
          format: date-time
        chainId:
          type: string
  responses:
    Error413:
      description: Request body too large
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error429:
      description: Rate limited
      headers:
        Retry-After:
          description: Seconds until next request is allowed.
          schema:
            type: integer
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error415:
      description: Unsupported media type
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error500:
      description: Internal server error
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Not found
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error400:
      description: Bad request
      headers:
        X-Request-Id:
          $ref: '#/components/headers/X-Request-Id'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  headers:
    X-Request-Id:
      description: Request identifier for tracing.
      schema:
        type: string
    Cache-Control:
      description: Cache policy for this response.
      schema:
        type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication (optional; higher rate limits).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: 'Alternative to X-API-Key using Authorization: Bearer <key>'
    AdminSecret:
      type: apiKey
      in: header
      name: X-Admin-Secret
      description: Admin secret (server-to-server) for API key management.
    PlatformSession:
      type: apiKey
      in: cookie
      name: euler_platform_session
      description: Signed, httpOnly platform-operator browser session cookie.
    PlatformCsrf:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Double-submit CSRF token required for unsafe cookie-authenticated methods.
