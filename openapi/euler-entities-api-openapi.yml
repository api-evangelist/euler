components:
  schemas:
    EntityMemberCreateRequest:
      type: object
      additionalProperties: false
      required:
      - email
      properties:
        email:
          type: string
          format: email
          pattern: ^[^@\s]+@[^@\s]+\.[^@\s]+$
        name:
          type: string
          pattern: \S
          nullable: true
        role:
          type: string
          enum:
          - admin
          - editor
          default: editor
    EntityCreateRequest:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      properties:
        id:
          type: string
          pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
        name:
          type: string
          pattern: \S
        logo:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        description:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialTwitter:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialYoutube:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialDiscord:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialTelegram:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialGithub:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
    PaginationMeta:
      type: object
      required:
      - timestamp
      properties:
        total:
          type: integer
          description: Exact total count when the endpoint provides one.
        hasMore:
          type: boolean
          description: Indicates whether another page exists beyond the current page.
        offset:
          type: integer
        limit:
          type: integer
          description: Echoed page size after endpoint-side clamping.
        timestamp:
          type: string
          format: date-time
        chainId:
          type: string
          description: Comma-separated chain IDs for multi-chain responses.
    EntityMember:
      type: object
      required:
      - id
      - entityId
      - email
      - name
      - role
      - createdAt
      - revokedAt
      properties:
        id:
          type: string
          format: uuid
        entityId:
          type: string
          pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
        email:
          type: string
          format: email
          pattern: ^[^@\s]+@[^@\s]+\.[^@\s]+$
          description: Normalized lowercase email address.
        name:
          type: string
          pattern: \S
          nullable: true
        role:
          type: string
          enum:
          - admin
          - editor
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
    Entity:
      type: object
      required:
      - id
      - name
      - logo
      - description
      - url
      - socialTwitter
      - socialYoutube
      - socialDiscord
      - socialTelegram
      - socialGithub
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
          description: Stable lowercase slug identifier.
        name:
          type: string
          pattern: \S
        logo:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        description:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialTwitter:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialYoutube:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialDiscord:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialTelegram:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialGithub:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    EntityUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          pattern: \S
        logo:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        description:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialTwitter:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialYoutube:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialDiscord:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialTelegram:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
        socialGithub:
          type: string
          format: uri
          pattern: ^[Hh][Tt][Tt][Pp][Ss]?://
          nullable: true
    EntityMemberUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          pattern: \S
          nullable: true
        role:
          type: string
          enum:
          - admin
          - editor
    EntityAddress:
      type: object
      required:
      - entityId
      - chainId
      - address
      - label
      properties:
        entityId:
          type: string
          pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
        chainId:
          type: integer
          minimum: 1
        address:
          type: string
          pattern: ^0x[a-fA-F0-9]{40}$
          description: EIP-55 checksummed governance address in API responses.
        label:
          type: string
          pattern: \S
          description: Human-readable governance address label.
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          - requestId
          properties:
            code:
              type: string
              description: 'Domain error code. Examples:

                - INVALID_ADDRESS

                - CHAIN_NOT_SUPPORTED

                - VAULT_NOT_FOUND

                - TOKEN_NOT_FOUND

                - ACCOUNT_NOT_FOUND

                - VALIDATION_ERROR

                - RATE_LIMIT_EXCEEDED

                - UNSUPPORTED_MEDIA_TYPE

                - UNAUTHORIZED

                - FORBIDDEN

                - INTERNAL_ERROR

                '
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
              additionalProperties: true
    EntityAddressCreateRequest:
      type: object
      additionalProperties: false
      required:
      - chainId
      - address
      - label
      properties:
        chainId:
          type: integer
          minimum: 1
        address:
          type: string
          pattern: ^0x[a-fA-F0-9]{40}$
          description: Valid EVM address. Lowercase or correctly checksummed mixed-case input is accepted.
        label:
          type: string
          pattern: \S
          description: Human-readable governance address label.
  headers:
    X-Request-Id:
      description: Request identifier for tracing.
      schema:
        type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication (optional; higher rate limits).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: 'Alternative to X-API-Key using Authorization: Bearer <key>'
    AdminSecret:
      type: apiKey
      in: header
      name: X-Admin-Secret
      description: Admin secret (server-to-server) for API key management.
    PlatformSession:
      type: apiKey
      in: cookie
      name: euler_platform_session
      description: Signed, httpOnly platform-operator browser session cookie.
    PlatformCsrf:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Double-submit CSRF token required for unsafe cookie-authenticated methods.
